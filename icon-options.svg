<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#f6f8fb"/>
  <text x="70" y="80" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#152238">FreeSafeAuth Personal 图标候选</text>
  <text x="70" y="120" font-family="Arial, sans-serif" font-size="18" fill="#5d6b7a">选择一个方向后，我会把它正式做成 Android adaptive icon 并编译 APK</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#132033" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="blueGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b5cad"/>
      <stop offset="1" stop-color="#18a058"/>
    </linearGradient>
    <linearGradient id="navyCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a43"/>
      <stop offset="1" stop-color="#20c7b5"/>
    </linearGradient>
    <linearGradient id="mintInk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9fff6"/>
      <stop offset="1" stop-color="#087f5b"/>
    </linearGradient>
  </defs>

  <g transform="translate(70 170)">
    <rect x="0" y="0" width="360" height="280" rx="24" fill="#fff" filter="url(#shadow)"/>
    <rect x="105" y="36" width="150" height="150" rx="34" fill="url(#blueGreen)"/>
    <path d="M180 68l50 18v34c0 35-20 58-50 72-30-14-50-37-50-72V86z" fill="#fff" opacity="0.96"/>
    <path d="M158 118v-16a22 22 0 0144 0v16h-11v-16a11 11 0 00-22 0v16z" fill="#0b5cad"/>
    <rect x="151" y="116" width="58" height="45" rx="9" fill="#0b5cad"/>
    <circle cx="180" cy="137" r="6" fill="#fff"/>
    <rect x="177" y="142" width="6" height="11" rx="3" fill="#fff"/>
    <text x="30" y="226" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#152238">A. 盾牌锁</text>
    <text x="30" y="254" font-family="Arial, sans-serif" font-size="16" fill="#5d6b7a">安全感最强，偏专业工具</text>
  </g>

  <g transform="translate(520 170)">
    <rect x="0" y="0" width="360" height="280" rx="24" fill="#fff" filter="url(#shadow)"/>
    <rect x="105" y="36" width="150" height="150" rx="34" fill="#0f766e"/>
    <circle cx="180" cy="111" r="54" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" stroke-dasharray="238 100"/>
