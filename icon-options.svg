    <path d="M140 70v-7a40 40 0 0180 0v7h-13v-7a27 27 0 00-54 0v7z" fill="#18a058"/>
    <text x="30" y="226" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#152238">F. 数字保险箱</text>
    <text x="30" y="254" font-family="Arial, sans-serif" font-size="16" fill="#5d6b7a">突出验证码本体，更工具化</text>
