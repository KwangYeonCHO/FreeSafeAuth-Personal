    <text x="30" y="226" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#152238">E. 安全勾选</text>
    <text x="30" y="254" font-family="Arial, sans-serif" font-size="16" fill="#5d6b7a">简洁、安心，适合长期使用</text>
