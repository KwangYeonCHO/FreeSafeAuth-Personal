    <text x="30" y="254" font-family="Arial, sans-serif" font-size="16" fill="#5d6b7a">突出 TOTP 动态验证码</text>
  </g>

  <g transform="translate(970 170)">
    <rect x="0" y="0" width="360" height="280" rx="24" fill="#fff" filter="url(#shadow)"/>
    <rect x="105" y="36" width="150" height="150" rx="34" fill="url(#navyCyan)"/>
