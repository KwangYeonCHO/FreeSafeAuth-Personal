    <rect x="105" y="36" width="150" height="150" rx="34" fill="#1d4ed8"/>
    <rect x="136" y="68" width="88" height="88" rx="18" fill="#fff"/>
    <rect x="151" y="85" width="18" height="18" rx="4" fill="#1d4ed8"/>
    <rect x="190" y="85" width="18" height="18" rx="4" fill="#1d4ed8"/>
