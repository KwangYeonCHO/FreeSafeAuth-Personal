    <text x="30" y="226" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#152238">C. 2FA 锁</text>
    <text x="30" y="254" font-family="Arial, sans-serif" font-size="16" fill="#5d6b7a">识别度直接，应用商店友好</text>
